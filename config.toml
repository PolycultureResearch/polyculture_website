# Polyculture Research website configuration
base_url = "https://polycultureresearch.com"
title = "Polyculture Research"
description = "Data science and analytics consulting for sustainability-focused companies. Measure what matters."
author = "Devon"
theme = "polyculture"

compile_sass = true
minify_html = true
generate_feeds = true
feed_filenames = ["atom.xml"]
build_search_index = false

taxonomies = [
    { name = "tags", feed = true },
]

[markdown]
smart_punctuation = true

[extra]
keywords = ["data science", "analytics", "sustainability", "consulting", "B Corp"]

navigation = [
    { url = "$BASE_URL", title = "Home" },
    { url = "$BASE_URL/services", title = "Services" },
    { url = "$BASE_URL/about", title = "About" },
    { url = "$BASE_URL/contact", title = "Contact" },
]

[extra.hero]
title = "Measure what matters"
image = "/images/alamany_farm.jpeg"
image_alt = "Alemany Farm - urban agriculture in San Francisco"

[extra.footer]
menu = [
    { url = "$BASE_URL", title = "Home" },
    { url = "$BASE_URL/services", title = "Services" },
    { url = "$BASE_URL/about", title = "About" },
    { url = "$BASE_URL/contact", title = "Contact" },
]
copyright = "Polyculture Research"
