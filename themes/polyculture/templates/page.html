{% extends "base.html" %}

{% block content %}
<article class="page">
  <header class="page__header">
    <div class="container">
      <h1 class="page__title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="page__description">{{ page.description }}</p>
      {% endif %}
    </div>
  </header>

  <div class="container">
    <div class="content">
      {{ page.content | safe }}
    </div>
  </div>
</article>
{% endblock %}
