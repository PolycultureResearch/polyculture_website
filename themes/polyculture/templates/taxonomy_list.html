{% extends "base.html" %}

{% block content %}
<article class="page">
  <header class="page__header">
    <div class="container">
      <h1 class="page__title">{{ taxonomy.name | title }}</h1>
    </div>
  </header>

  <div class="container">
    <ul class="tag-list">
      {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}">{{ term.name }}</a>
        <span class="tag-count">({{ term.pages | length }})</span>
      </li>
      {% endfor %}
    </ul>
  </div>
</article>
{% endblock %}
